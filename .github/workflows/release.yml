name: Release

# Build a macOS DMG and attach it to a GitHub Release whenever you push a
# version tag (e.g. `git tag v0.1.0 && git push --tags`). The app is NOT
# notarized (free/open-source) — users clear quarantine once on first launch.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build DMG (unsigned, no notarization)
        run: npm run dist
        env:
          # Explicitly disable signing/notarization — identity is null in
          # package.json, these just make electron-builder skip cleanly in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Compute checksum
        run: |
          cd release
          DMG=$(ls *.dmg | head -1)
          shasum -a 256 "$DMG" | tee "$DMG.sha256"
          echo "Cask needs: sha256 \"$(shasum -a 256 "$DMG" | cut -d' ' -f1)\""

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.dmg.sha256
          generate_release_notes: true
