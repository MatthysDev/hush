<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="880" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A99BFF"/>
      <stop offset="0.5" stop-color="#8B7CFF"/>
      <stop offset="1" stop-color="#5B4BD6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mic" x1="512" y1="236" x2="512" y2="812" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EBE7FF"/>
    </linearGradient>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#160E3A" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="236" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="236" fill="url(#glow)"/>

  <!-- microphone -->
  <g filter="url(#soft)">
    <rect x="418" y="236" width="188" height="392" rx="94" fill="url(#mic)"/>
    <path d="M330 500 a182 182 0 0 0 364 0" fill="none" stroke="url(#mic)" stroke-width="48" stroke-linecap="round"/>
    <rect x="488" y="672" width="48" height="104" rx="24" fill="url(#mic)"/>
    <rect x="396" y="766" width="232" height="48" rx="24" fill="url(#mic)"/>
  </g>

  <!-- "muted / safe" status dot, tied to the app's mint accent -->
  <circle cx="694" cy="316" r="62" fill="#0F0F14"/>
  <circle cx="694" cy="316" r="42" fill="#54E6C0"/>
</svg>
