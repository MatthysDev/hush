<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9A8CFF"/>
      <stop offset="0.55" stop-color="#7C6CFF"/>
      <stop offset="1" stop-color="#5B4BD6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.26" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1A1140" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#glow)"/>

  <!-- microphone -->
  <g filter="url(#soft)">
    <!-- capsule body -->
    <rect x="420" y="250" width="184" height="376" rx="92" fill="#FFFFFF"/>
    <!-- holder arc -->
    <path d="M344 512 a168 168 0 0 0 336 0" fill="none" stroke="#FFFFFF" stroke-width="46" stroke-linecap="round"/>
    <!-- stand -->
    <rect x="489" y="660" width="46" height="92" rx="23" fill="#FFFFFF"/>
    <!-- base -->
    <rect x="404" y="742" width="216" height="46" rx="23" fill="#FFFFFF"/>
  </g>

  <!-- status dot (mic-off / safe = mint) -->
  <circle cx="690" cy="320" r="58" fill="#0F0F14"/>
  <circle cx="690" cy="320" r="40" fill="#54E6C0"/>
</svg>
